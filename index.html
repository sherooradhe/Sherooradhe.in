<!DOCTYPE html>
<html>
<head>
<title>Radha Krishna</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  color: white;
  background: url('radha-krishna.jpg') no-repeat center center/cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.content {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  animation: fadeIn 2s ease;
}

h1 { font-size: 50px; }
p { font-size: 20px; margin-top: 10px; }

/* Buttons */
.buttons {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.yes {
  background: #ff758c;
  color: white;
}

.no {
  background: white;
  color: #ff758c;
  position: absolute;
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translate(-50%, -40%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>Radha ❤️ Krishna</h1>
  <p>Aao Undar chale</p>

  <div class="buttons">
    <button class="yes">Yes</button>
    <button class="no" id="noBtn">No</button>
  </div>
</div>

<!-- 🎵 Song -->
<audio id="music" autoplay>
  <source src="Song.Mp4" type="audio/mpeg">
</audio>

<script>
// 30 sec song stop
let audio = document.getElementById("music");
setTimeout(() => { audio.pause(); }, 30000);

// No button bhaagega 😄
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  let x = Math.random() * window.innerWidth - 100;
  let y = Math.random() * window.innerHeight - 50;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
