<!DOCTYPE html>
<html>
<head>
<title>Entry ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.box {
  text-align: center;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

.yes {
  background: white;
  color: #ff4b5c;
}

.no {
  background: #fff;
  color: red;
  position: absolute;
}
</style>
</head>

<body>

<div class="box">
  <h1>Radha ❤️ Krishna</h1>
  <p>Aao andar chale 💫</p>

  <button class="yes" onclick="goNext()">Yes</button>
  <button class="no" id="noBtn">No</button>
</div>

<script>
function goNext(){
  window.location.href = "page2.html";
}

let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", ()=>{
  noBtn.style.top = Math.random()*80 + "%";
  noBtn.style.left = Math.random()*80 + "%";
});
</script>

</body>
</html>
