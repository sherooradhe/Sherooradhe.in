<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Love World ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: black;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  color: #ff4d6d;
  text-shadow: 0 0 20px #ff4d6d;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* LOVE SECTION */
.section {
  padding: 50px;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.1);
  margin: 15px auto;
  padding: 20px;
  width: 250px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.box:hover {
  transform: scale(1.05);
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>

</head>

<body>

<div class="hero">
  <h1>Ek Duniya Sirf Tumhare Liye ❤️</h1>
  <button class="btn" onclick="playMusic()">Enter My World</button>

<div class="section" id="love">
  <h2>Our Journey 💕</h2>

  <div class="box">🌸 First Meet</div>
  <div class="box">💬 First Talk</div>
  <div class="box">😊 First Smile</div>
  <div class="box">❤️ Falling in Love</div>
</div>

<!-- MUSIC -->
  <audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function scrollDown() {
  document.getElementById("love").scrollIntoView({ behavior: "smooth" });
}

// HEART GENERATOR
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
  <script>
function playMusic() {
  let music = document.getElementById("music");
  music.play();

  document.getElementById("love").scrollIntoView({ behavior: "smooth" });
}
  </script>

</body>
</html>
