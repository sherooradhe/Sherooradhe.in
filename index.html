<!DOCTYPE html>
<html>
<head>
<title>Radha🥰🥰</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(blue, purple);
  color: white;
}

/* 🔴 Top Moving Text */
.marquee {
  background: black;
  color: yellow;
  padding: 10px;
  font-size: 16px;

}

  padding: 12px;

  color: white;
  text-decoration: none;
  font-size: 18px;
}

/* 🔍 Search */
.search-box {
  padding: 15px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;

  font-size: 16px;
}

/* 🎯 Content Box */
.box {
  margin: 30px 15px;
  padding: 20px;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  text-align: center;
}

h1 {
  font-size: 28px;
}

/* 🔘 Buttons */
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 25px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}
</style>

</head>
